<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solución Ejercicio 2 - Portafolio con Modal - INI04</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
</head>
<body>
    <!-- Carrusel -->
    <div id="portafolioCarousel" class="carousel slide" data-bs-ride="carousel">
        <div class="carousel-indicators">
            <button data-bs-target="#portafolioCarousel" data-bs-slide-to="0" class="active"></button>
            <button data-bs-target="#portafolioCarousel" data-bs-slide-to="1"></button>
            <button data-bs-target="#portafolioCarousel" data-bs-slide-to="2"></button>
        </div>
        <div class="carousel-inner">
            <div class="carousel-item active">
                <img src="https://via.placeholder.com/1200x400/8B0000/ffffff?text=Slider+1" class="d-block w-100" alt="Slide 1">
            </div>
            <div class="carousel-item">
                <img src="https://via.placeholder.com/1200x400/DC143C/ffffff?text=Slider+2" class="d-block w-100" alt="Slide 2">
            </div>
            <div class="carousel-item">
                <img src="https://via.placeholder.com/1200x400/333333/ffffff?text=Slider+3" class="d-block w-100" alt="Slide 3">
            </div>
        </div>
        <button class="carousel-control-prev" data-bs-target="#portafolioCarousel" data-bs-slide="prev">
            <span class="carousel-control-prev-icon"></span>
        </button>
        <button class="carousel-control-next" data-bs-target="#portafolioCarousel" data-bs-slide="next">
            <span class="carousel-control-next-icon"></span>
        </button>
    </div>

    <main class="container my-5">
        <!-- Sobre mí -->
        <section class="row mb-5">
            <div class="col-md-6">
                <h2>Sobre Mí</h2>
                <p>Soy un desarrollador web apasionado por crear soluciones digitales innovadoras. Con experiencia en HTML, CSS, JavaScript y Bootstrap.</p>
                <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#contactoModal">
                    <i class="bi bi-envelope"></i> Contáctame
                </button>
            </div>
            <div class="col-md-6">
                <img src="https://via.placeholder.com/400x300/8B0000/ffffff?text=Foto+Perfil" class="img-fluid rounded">
            </div>
        </section>
    </main>

    <!-- Modal de Contacto -->
    <div class="modal fade" id="contactoModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Formulario de Contacto</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form class="was-validated">
                        <div class="mb-3">
                            <label for="nombre" class="form-label">Nombre</label>
                            <input type="text" class="form-control" id="nombre" required>
                            <div class="invalid-feedback">Por favor ingresa tu nombre.</div>
                        </div>
                        <div class="mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="email" required>
                            <div class="invalid-feedback">Por favor ingresa un email válido.</div>
                        </div>
                        <div class="mb-3">
                            <label for="mensaje" class="form-label">Mensaje</label>
                            <textarea class="form-control" id="mensaje" rows="4" required></textarea>
                            <div class="invalid-feedback">Por favor ingresa un mensaje.</div>
                        </div>
                        <button type="submit" class="btn btn-primary">Enviar</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
