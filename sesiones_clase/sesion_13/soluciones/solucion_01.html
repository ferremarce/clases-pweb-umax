<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solución Ejercicio 1 - Layout Básico con Grid - INI04</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        .box { background: #e9ecef; padding: 20px; text-align: center; border: 1px solid #dee2e6; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <div class="container my-5">
        <h1 class="text-center mb-4">Solución: Layout Básico con Grid</h1>
        
        <!-- Fila con 2 columnas -->
        <div class="row mb-4">
            <div class="col-6"><div class="box">Columna 1 (col-6)</div></div>
            <div class="col-6"><div class="box">Columna 2 (col-6)</div></div>
        </div>
        
        <!-- Fila con 3 columnas -->
        <div class="row mb-4">
            <div class="col-4"><div class="box">Columna 1 (col-4)</div></div>
            <div class="col-4"><div class="box">Columna 2 (col-4)</div></div>
            <div class="col-4"><div class="box">Columna 3 (col-4)</div></div>
        </div>
        
        <!-- Fila con 4 columnas -->
        <div class="row mb-4">
            <div class="col-3"><div class="box">1</div></div>
            <div class="col-3"><div class="box">2</div></div>
            <div class="col-3"><div class="box">3</div></div>
            <div class="col-3"><div class="box">4</div></div>
        </div>
        
        <div class="alert alert-info mt-4">
            <strong>💡 Nota:</strong> El sistema de Grid de Bootstrap divide el espacio en 12 columnas. Usar col-6 significa ocupar 6 de las 12 columnas (50%).
        </div>
    </div>
</body>
</html>
